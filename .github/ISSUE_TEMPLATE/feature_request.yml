name: Feature request
description: Suggest an improvement to the package or docs.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or docs change you want.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Framework, browser, screenshots, or examples.
