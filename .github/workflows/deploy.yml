name: Deploy

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install pnpm
              run: npm install -g pnpm@10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build smooth-div package
              run: pnpm --filter smooth-div build

            - name: Install Vercel CLI
              run: npm install -g vercel

            - name: Build site via Vercel
              run: vercel build --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
              working-directory: apps/site
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Deploy to Vercel
              run: vercel deploy --prod --yes --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
              working-directory: apps/site
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
